<!DOCTYPE html>
<html>
<head>
    <title>Student Fee Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Student Fee Manager</h1>

    <div class="form">
        <input type="text" id="name" placeholder="Student Name">
        <input type="number" id="amount" placeholder="Fee Amount">
        <input type="month" id="dueDate">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <h2>Student List</h2>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Amount</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
